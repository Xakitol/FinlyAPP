<body>
    <header>
        <div class="header-right">
            <h1>משפחת טולדנו | ניהול הון</h1>
        </div>
        <div class="header-left">
            <select id="month-filter" class="month-select"></select>
        </div>
    </header>

    <main class="dashboard-layout">
        <section class="summary-row">
            <div class="card income-card">
                <span>הכנסות חודשיות</span>
                <p id="total-income">₪0</p>
            </div>
            <div class="card expense-card">
                <span>הוצאות חודשיות</span>
                <p id="total-expenses">₪0</p>
            </div>
            <div class="card balance-card">
                <span>יתרה נטו</span>
                <p id="balance">₪0</p>
            </div>
        </section>

        <section class="main-grid">
            <div class="actions-column">
                <div class="action-card" onclick="openModal('modal-form')">
                    <div class="icon-box">+</div>
                    <h3>הוספת תנועה</h3>
                    <p>תיעוד הכנסה או הוצאה חדשה</p>
                </div>
                <div class="action-card" onclick="openModal('modal-table')">
                    <div class="icon-box">☰</div>
                    <h3>רשימת תנועות</h3>
                    <p>צפייה, עריכה וניהול היסטוריה</p>
                </div>
            </div>

            <div class="chart-main-card">
                <div class="chart-header">
                    <div class="chart-title">
                        <span class="chart-icon">📊</span>
                        <h3>פילוח הוצאות</h3>
                    </div>
                    <div class="chart-switcher">
                        <button onclick="changeChartType('doughnut')" title="גרף עוגה">⭕</button>
                        <button onclick="changeChartType('bar')" title="גרף עמודות">📊</button>
                        <button onclick="changeChartType('line')" title="גרף קווי">📈</button>
                    </div>
                </div>
                <div class="chart-wrapper">
                    <canvas id="main-chart"></canvas>
                </div>
            </div>
        </section>
    </main>

    <div id="modal-form" class="modal">...</div>
    <div id="modal-table" class="modal">...</div>

    <script type="module" src="app.js"></script>
</body>
