<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finly Test Version</title>
    <link rel="stylesheet" href="test-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
    <div style="display: flex; align-items: center;">
        <h1 class="brand-name">Finly</h1>
        <span class="brand-tagline">ניהול פיננסי חכם</span>
    </div>
    <select id="month-filter" class="month-select"></select>
</header>

<main class="dashboard-layout">
    <section class="summary-row">
        <div class="card"><h3>הכנסות</h3><p id="total-income">₪0</p></div>
        <div class="card"><h3>הוצאות</h3><p id="total-expenses">₪0</p></div>
        <div class="card"><h3>יתרה</h3><p id="balance">₪0</p></div>
    </section>

    <section class="vision-grid">
        <div class="action-card" onclick="openModal('modal-form')">
            <div class="icon-box">➕</div>
            <h3>הוספת תנועה</h3>
        </div>
        <div class="action-card" onclick="openModal('modal-table')">
            <div class="icon-box">📋</div>
            <h3>רשימת תנועות</h3>
        </div>
        <div class="action-card" onclick="openVisionHub()">
            <div class="icon-box">📊</div>
            <h3>ניתוח נתונים</h3>
        </div>
    </section>
</main>

<div id="modal-form" class="modal">
    <div class="modal-content">
        <button class="close-btn" onclick="closeModal('modal-form')">✖</button>
        <h2 style="text-align:center">תנועה חדשה</h2>
        <div class="type-selector">
            <button id="type-btn-expense" class="active">הוצאה</button>
            <button id="type-btn-income">הכנסה</button>
        </div>
        <form id="transaction-form">
            <input type="text" id="transaction-name" placeholder="תיאור (למשל: סופר)" required>
            <input type="number" id="transaction-amount" placeholder="סכום" required>
            <select id="transaction-category"></select>
            <button type="submit" class="submit-btn">שמירה</button>
        </form>
    </div>
</div>

<div id="modal-table" class="modal">
    <div class="modal-content full-width">
        <button class="close-btn" onclick="closeModal('modal-table')">✖</button>
        <h2>פירוט תנועות</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>תיאור</th><th>קטגוריה</th><th>סוג</th><th>סכום</th><th>תאריך</th><th>פעולות</th></tr>
                </thead>
                <tbody id="transactions-body"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="modal-vision-hub" class="modal vision-overlay">
    <button class="close-vision" onclick="closeModal('modal-vision-hub')">✖</button>
    <div class="vision-content">
        <h2 class="vision-title">בחר תצוגה</h2>
        <div class="charts-options-container">
            <div class="chart-option-box" onclick="showSpecificChart('doughnut')">
                <div class="preview-icon">🍩</div>
                <p>גרף עוגה</p>
            </div>
            <div class="chart-option-box" onclick="showSpecificChart('bar')">
                <div class="preview-icon">📊</div>
                <p>גרף עמודות</p>
            </div>
            <div class="chart-option-box" onclick="showSpecificChart('line')">
                <div class="preview-icon">📈</div>
                <p>גרף קו</p>
            </div>
        </div>
    </div>
</div>

<div id="modal-single-chart" class="modal vision-overlay">
    <button class="close-vision" onclick="closeModal('modal-single-chart')">✖</button>
    <div class="vision-content">
        <div class="chart-display-area" style="width: 80%; height: 60vh; margin: 0 auto; background: white; border-radius: 30px; padding: 20px; position: relative;">
            <canvas id="main-chart"></canvas>
            <button onclick="backToHub()" style="margin-top: 20px; padding: 10px 20px; cursor: pointer; border-radius: 10px; border: none; background: var(--more-navy); color: white;">חזרה לתפריט</button>
        </div>
    </div>
</div>

<div class="finly-mascot-container">
    <img src="https://raw.githubusercontent.com/finkasit/MyMoneyApp/main/finly-mascot.png" class="mascot-image" alt="Finly">
</div>

<script type="module" src="test-app.js"></script>
</body>
</html>
