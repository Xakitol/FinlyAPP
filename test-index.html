<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finly Vision | ניהול פיננסי חכם</title>
    
    <link rel="stylesheet" href="test-style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <header>
        <div class="header-right">
            <div class="logo-area">
                <span class="logo-icon">💎</span>
                <h1 class="brand-name">Finly</h1>
                <span class="brand-tagline">| Smart Finance</span>
            </div>
        </div>
        <div class="header-left">
            <select id="month-filter" class="month-select"></select>
        </div>
    </header>

    <main class="container">
        <section class="stats-grid">
            <div class="stat-card">
                <h3>הכנסות חודשיות</h3>
                <p id="total-income" class="amount" style="color: var(--more-teal)">₪0</p>
            </div>
            <div class="stat-card">
                <h3>הוצאות חודשיות</h3>
                <p id="total-expenses" class="amount" style="color: #ff5a5f">₪0</p>
            </div>
            <div class="stat-card">
                <h3>יתרה נטו</h3>
                <p id="balance" class="amount">₪0</p>
            </div>
        </section>

        <section class="actions-grid">
            <button class="action-btn" onclick="openModal('modal-form')">
                <span>➕</span>
                הוספת תנועה
            </button>
            <button class="action-btn" onclick="openModal('modal-table')">
                <span>☰</span>
                רשימת תנועות
            </button>
            <button class="action-btn" onclick="openVisionHub()">
                <span>📊</span>
                ניתוח נתונים
            </button>
        </section>
    </main>

    <div id="modal-vision-hub" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('modal-vision-hub')">&times;</span>
            <h2 style="text-align: center; margin-bottom: 20px;">מה ננתח הפעם?</h2>
            <div class="vision-grid">
                <div class="action-btn" onclick="showSpecificChart('doughnut')">
                    <span>⭕</span> גרף עוגה
                </div>
                <div class="action-btn" onclick="showSpecificChart('bar')">
                    <span>📊</span> גרף עמודות
                </div>
                <div class="action-btn" onclick="showSpecificChart('line')">
                    <span>📈</span> מגמת הוצאות
                </div>
            </div>
        </div>
    </div>

    <div id="modal-single-chart" class="modal">
        <div class="modal-content" style="max-width: 800px;">
            <button class="close-btn" onclick="backToHub()">✖</button>
            <div class="chart-container">
                <canvas id="main-chart"></canvas>
            </div>
        </div>
    </div>

    <div id="modal-form" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('modal-form')">&times;</span>
            <h2>ניהול תנועה</h2>
            <form id="transaction-form">
                <div class="type-selector">
                    <button type="button" id="type-btn-expense" class="type-btn active">הוצאה</button>
                    <button type="button" id="type-btn-income" class="type-btn">הכנסה</button>
                </div>
                <div class="form-group">
                    <input type="text" id="transaction-name" placeholder="תיאור (למשל: סופר, משכורת)" required>
                </div>
                <div class="form-group">
                    <input type="number" id="transaction-amount" placeholder="סכום ב-₪" required>
                </div>
                <div class="form-group">
                    <select id="transaction-category" required></select>
                </div>
                <button type="submit" class="submit-btn">שמור תנועה</button>
            </form>
        </div>
    </div>

    <div id="modal-table" class="modal">
        <div class="modal-content" style="max-width: 1000px;">
            <span class="close-btn" onclick="closeModal('modal-table')">&times;</span>
            <h2>היסטוריית תנועות</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>תיאור</th>
                            <th>קטגוריה</th>
                            <th>סוג</th>
                            <th>סכום</th>
                            <th>תאריך</th>
                            <th>פעולות</th>
                        </tr>
                    </thead>
                    <tbody id="transactions-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module" src="test-app.js"></script>
</body>
</html>
